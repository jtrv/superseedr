name: Test Signing (Explicit Trust)

on: [push, workflow_dispatch]

env:
  KEYCHAIN_PASS: "temp-build-password"

jobs:
  test_signing_mechanics:
    runs-on: macos-latest
    timeout-minutes: 5 # Fail fast
    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Setup Keychain (Trust Strategy)
        env:
          p12_base64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          p12_password: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
        run: |
          set -e
          
          # 1. Define Absolute Path
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "Using keychain at: $KEYCHAIN_PATH"

          # 2. Create & Configure
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          
          # --- CRITICAL MISSING STEP ---
          # We must add the keychain to the search list, or codesign won't find it.
          security list-keychains -s "$KEYCHAIN_PATH"
          
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 0 -u "$KEYCHAIN_PATH"

          # 3. Import with Explicit Trust (-T)
          # We REMOVED -A (Allow All) and replaced it with -T (Trust Tool).
          # This tells the keychain: "Allow /usr/bin/codesign to use this key immediately."
          # This creates the ACL entry during import, making 'set-key-partition-list' unnecessary.
          
          echo "$p12_base64" | base64 --decode > certificate.p12
          
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$p12_password" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          
          rm certificate.p12

          # 4. Verify Identity
          security find-identity -v "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: ✍️ Test Signing
        run: |
          touch dummy_app.bin
          
          CERT_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" | grep "Developer ID" | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')
          
          if [ -z "$CERT_IDENTITY" ]; then
             echo "::error::No Identity Found!"
             exit 1
          fi
          
          echo "Signing with: $CERT_IDENTITY"
          
          # Force sign. If this works, the build is fixed.
          /usr/bin/codesign -vvv --force --sign "$CERT_IDENTITY" dummy_app.bin
          
          echo "✅ Signing Success!"
