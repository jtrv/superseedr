name: Test Signing (Final Fix)

on: [push, workflow_dispatch]

env:
  KEYCHAIN_PASS: "temp-build-password"

jobs:
  test_signing_mechanics:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Setup Keychain
        env:
          p12_base64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          p12_password: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
        run: |
          set -e # Fail script immediately on error
          
          # 1. Define Absolute Path (Critical for avoiding UI prompts)
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "Using keychain at: $KEYCHAIN_PATH"

          # 2. Create & Configure
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          
          # 3. SET TIMEOUT TO 0 (Infinite)
          # Your logs showed 300s previously. This fixes the long-build hang.
          security set-keychain-settings -t 0 -u "$KEYCHAIN_PATH"

          # 4. Import Certificate (Allow All Apps)
          echo "$p12_base64" | base64 --decode > certificate.p12
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$p12_password" -A
          rm certificate.p12

          # 5. Set Partition List (The Fix)
          # We removed 'timeout 30s' because it crashed. 
          # The absolute path + -k flag should prevent the hang.
          echo "Setting partition list permissions..."
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASS" \
            "$KEYCHAIN_PATH"

          # 6. Verify Identity
          security find-identity -v "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: ✍️ Test Signing
        run: |
          touch dummy_app.bin
          
          CERT_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" | grep "Developer ID" | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')
          
          if [ -z "$CERT_IDENTITY" ]; then
             echo "::error::No Identity Found!"
             exit 1
          fi
          
          echo "Signing with: $CERT_IDENTITY"
          /usr/bin/codesign -vvv --force --sign "$CERT_IDENTITY" dummy_app.bin
          
          echo "✅ Signing Success!"
