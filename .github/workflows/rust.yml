name: Test Signing (Manual & Secure)

# Trigger on push, but keep manual button just in case
on:
  push:
  workflow_dispatch:

env:
  KEYCHAIN_PASS: "temp-build-password"

jobs:
  test_signing_manual:
    runs-on: macos-latest
    timeout-minutes: 10  # <--- Added 10 minute timeout
    
    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Setup Keychain (Absolute Path Fix)
        env:
          p12_base64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          p12_password: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
        run: |
          # Use absolute path to prevent "UI Prompt" hangs
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          
          # 1. Create and Configure
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 0 -u "$KEYCHAIN_PATH"
          
          # 2. Import Certificate (Allow All Apps)
          echo "$p12_base64" | base64 --decode > certificate.p12
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$p12_password" -A
          rm certificate.p12
          
          # 3. Set Partition List (The Critical Fix)
          #    Using absolute path and explicit unlock
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          
          echo "Setting permissions..."
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASS" \
            "$KEYCHAIN_PATH"
          
          # 4. Verify
          security find-identity -v "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: ✍️ Test Signing (Dummy File)
        run: |
          touch dummy_app.bin
          
          # Find identity
          CERT_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" | grep "Developer ID" | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')
          
          if [ -z "$CERT_IDENTITY" ]; then
             echo "::error::No Identity Found!"
             exit 1
          fi
          
          echo "Signing with: $CERT_IDENTITY"
          /usr/bin/codesign --force --sign "$CERT_IDENTITY" dummy_app.bin
          
          echo "✅ Success! Signing worked."
