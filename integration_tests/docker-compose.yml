networks:
  bittorrent-test:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  # --- Tracker Service ---
  tracker:
    image: anthonyzou/opentracker:latest
    platform: linux/arm64
    container_name: bittorrent-tracker
    restart: unless-stopped
    ports:
      - "6969:6969/tcp"
      - "6969:6969/udp"
    networks:
      bittorrent-test:
        aliases:
          - tracker
    volumes:
      - ./data/tracker_data:/var/lib/opentracker
    command: >
      opentracker -i 0.0.0.0
      -p 6969
      -P 6969
      -A 0.0.0.0/0
      --dedicated-network
      --allow-public-ip
      --no-log

  # --- Reference Client Service (qBittorrent) ---
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent-reference
    restart: unless-stopped
    depends_on:
      - tracker
    networks:
      bittorrent-test:
        aliases:
          - qbittorrent
          - reference-client
    ports:
      - "8080:8080/tcp"
    volumes:
      - qbittorrent_downloads:/downloads:rw
      - ./data/qbittorrent_config:/config:rw
    environment:
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
      - TZ=UTC
      - PASSWORD=adminadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/app/version", "||", "curl", "-f", "http://localhost:8080/"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # --- Download Client (Transmission) ---
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission-test
    restart: unless-stopped
    depends_on:
      - tracker
    networks:
      bittorrent-test:
        aliases:
          - transmission
    ports:
      - "9091:9091/tcp"
    volumes:
      - transmission_downloads:/downloads:rw
      - ./data/transmission_config:/config:rw
      - ./data/transmission_watch:/watch:rw
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/transmission/rpc", "||", "exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  qbittorrent_downloads:
  transmission_downloads:
